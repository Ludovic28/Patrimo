name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 12 */5 * *" # toutes les 5 jours à midi
  workflow_dispatch: # permet de lancer manuellement

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.VITE_PUBLIC_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}"
